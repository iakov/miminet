name: Linter

on: [push, pull_request]

jobs:

  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ['back', 'front']
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: ${{matrix.node}}/requirements.txt
            
      - name: Install dependencies
        run: |
          python -m pip install -U pip poetry wheel setuptools          
          if [ ${{matrix.node}} == 'back' ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends mininet
            mkdir -p /opt/mininet_dependencies
          fi
          poetry install --with dev-${{matrix.node}}end --no-root
          
      - name: Lint with mypy
        run: |
          poetry run mypy --install-types --non-interactive ${{matrix.node}}
          poetry run mypy --ignore-missing-imports ${{matrix.node}}

      - name: Lint with black
        run: |
          poetry run black --check --verbose --diff ${{matrix.node}}
          
      - name: Lint with flake8
        run: |
          poetry run flake8 --count --verbose --max-line-length=88 --extend-ignore=E501,W391,C901,E203 --statistics ${{matrix.node}}

      - name: Lint Dockerfile(s)
        uses: hadolint/hadolint-action@v3.3.0
        with:
          recursive: true
          no-fail: true

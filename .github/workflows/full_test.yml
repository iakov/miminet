name: Full test

on:
  workflow_run:
    workflows: [Linter]
    types: [completed]
  workflow_dispatch:

jobs:
  build:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker BuildX
        uses: docker/setup-buildx-action@v3

      - name: Start containers 
        run: |
          sed -i 's/MODE=prod/MODE=dev/' front/.env
          docker compose -f front/docker-compose.yml up -d --wait &
          docker compose -f front/tests/docker/docker-compose.yml up -d --wait &
          wait

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip uv
          uv venv --seed
          uv sync --group=dev-frontend --group=frontend --no-install-project
          sudo apt-get install -y --no-install-recommends ffmpeg

      - name: Check availability
        run: |
          docker ps
          docker compose -f front/docker-compose.yml ps
          docker compose -f front/tests/docker/docker-compose.yml ps

      - name: Run Selenium tests with video recording
        run: |
          mkdir -p front/tests/videos
          uv run pytest \
            -vv \
            -s \
            --html=front/tests/report.html \
            --self-contained-html \
            --tb=short \
            front/tests
        continue-on-error: true

      - name: Generate video recordings for failed tests
        if: failure()
        run: |
          cd front/tests
          # Create a simple video marker file for failed tests
          echo "Video recording for failed tests" > videos/REPORT.txt

      - name: Upload test report as artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: selenium-test-report
          path: front/tests/report.html
          retention-days: 7

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: selenium-screenshots
          path: front/tests/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload videos on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: selenium-videos
          path: front/tests/videos/
          if-no-files-found: ignore
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            let comment = '## 🧪 Selenium Test Results\n\n';
            
            if (fs.existsSync('front/tests/report.html')) {
              comment += '✅ HTML report generated and uploaded to artifacts\n';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment + '\nCheck the artifacts tab for detailed results.'
            });
        continue-on-error: true

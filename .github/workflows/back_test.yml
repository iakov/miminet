name: Pytest

on:
  workflow_run:
    workflows: [Linter]
    types: [completed]
  workflow_dispatch:

jobs:

  build:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
 
      - name: Install apt package
        run: |
          # update may fail because of external repos (yarn) – ignore errors
          sudo apt-get update || true
          sudo apt-get install -y --no-install-recommends \
          ifupdown \
          iproute2 \
          iptables \
          traceroute \
          curl \
          dnsutils \
          netcat-openbsd \
          openssh-client \
          iputils-ping \
          net-tools \
          bridge-utils \
          tcpdump \
          build-essential \
          libpcap-dev \
          libbsd-dev \
          dnsmasq \
          isc-dhcp-client \
          openvswitch-switch \
          git-core \
          mininet
          sudo touch /etc/network/interfaces
          sudo mkdir -p /opt/mininet_dependencies

      - name: Build mimidump
        run: |
          git clone https://github.com/mimi-net/mimidump.git
          cd mimidump && sudo make prefix=/usr install

      - name: Disable packet transmission to filters
        run: |
          sudo modprobe br_netfilter
          sudo sysctl -w net.bridge.bridge-nf-call-iptables=0
          sudo sysctl -w net.bridge.bridge-nf-call-arptables=0
          sudo sysctl -w net.bridge.bridge-nf-call-ip6tables=0
          sudo sysctl -p

      - name: Run Open VSwitch
        run: |
          sudo /usr/share/openvswitch/scripts/ovs-ctl start
          sudo ovs-vswitchd &

      - name: Test with pytest
        run: |
          sudo bash -c '
            python -m pip install --no-cache-dir --upgrade pip uv setuptools

            # setuptools is sometimes missing inside the uv venv; pytest-html
            # (installed by frontend group) requires pkg_resources.
            uv env --seed
            uv run pip install --upgrade setuptools
            uv sync --all-groups
            cd back/tests
            export PYTHONPATH=$PYTHONPATH:../src
            uv run pytest .
          '
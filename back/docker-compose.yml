version: "3.9"

services:
  miminet:
    build:
      context: .
      additional_contexts:
        project_root: ..
      dockerfile: ./Dockerfile
    container_name: celery
    hostname: miminet-worker
    network_mode: "host"
    restart: always
    env_file:
      - .env
    environment:
      - celery_concurrency=${celery_concurrency}
      - queue_names=${queue_names}
#    command: celery -A app.celery worker --loglevel=info
    privileged: true
    healthcheck:
      test: ["CMD", "uv", "run", "--no-sync", "python", "-m", "celery", "inspect", "ping", "-d", "celery@miminet-worker"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 15s

